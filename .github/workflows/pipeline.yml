name: Run Article Pipeline

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci

      - name: Generate articles → save to Notion as drafts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
        run: npm run pipeline

      - name: Commit draft files
        run: |
          git config user.name "Pipeline Bot"
          git config user.email "pipeline@the-pattern.xyz"
          git add content/articles/
          git diff --staged --quiet || git commit -m "content: add draft articles [$(date +%Y-%m-%d)]"
          git push
