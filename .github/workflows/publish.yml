name: Publish Approved Articles

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci

      - name: Publish approved articles from Notion
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
        run: npm run publish

      - name: Commit and push published articles
        run: |
          git config user.name "Pipeline Bot"
          git config user.email "pipeline@the-pattern.xyz"
          git add content/articles/
          git diff --staged --quiet || git commit -m "content: publish approved article(s) [$(date +%Y-%m-%d)]"
          git push
